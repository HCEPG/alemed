
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 RPNCE Premium Demo Mock Exam</title>

<style>
body {
  font-family: Calibri, Arial, sans-serif;
  background-color: #f4f9ff;
}

.quiz-box {
  max-width: 850px;
  margin: 25px auto;
  padding: 20px;
  border: 2px solid #7bb8ff;
  border-radius: 8px;
  background: #ffffff;
}

.quiz-question {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 15px;
}

.quiz-option {
  margin: 8px 0;
  padding: 10px;
  border: 1px solid #003366;
  border-radius: 4px;
  cursor: pointer;
}

.quiz-option:hover {
  background-color: #eef6ff;
}

.correct { border: 2px solid green; }
.incorrect { border: 2px solid #8b0000; }

.quiz-feedback {
  margin-top: 12px;
  display: none;
  font-size: 14px;
  white-space: pre-line;
}

.feedback-correct { color: green; }
.feedback-incorrect { color: #8b0000; }
</style>
</head>

<body>

<h2 style="text-align:center;">2026 RPNCE Premium Demo Mock Exam</h2>

<div id="quiz-container"></div>

<script>

const questions = [

{
q: "How many hours may blood hang before it must be discontinued?",
options: [
"4 hours",
"6 hours",
"8 hours",
"Until completion regardless of time"
],
correct: 0,
rationales: [
"CORRECT: Blood products must be completed within 4 hours of removal from controlled storage due to increased risk of bacterial proliferation at room temperature. This is a strict transfusion safety standard.",
"INCORRECT: 6 hours exceeds the maximum safe transfusion time and significantly increases risk of sepsis.",
"INCORRECT: 8 hours is unsafe and violates transfusion protocol standards.",
"INCORRECT: Time limits are mandatory; blood cannot hang indefinitely regardless of volume remaining."
]
},

{
q: "What is the FIRST action if a transfusion reaction is suspected (fever, chills, back pain)?",
options: [
"Slow the infusion",
"Stop transfusion and maintain IV with normal saline",
"Continue to monitor",
"Administer antihistamine only"
],
correct: 1,
rationales: [
"INCORRECT: Slowing the infusion does not prevent progression of hemolytic or septic reactions.",
"CORRECT: The transfusion must be stopped immediately to prevent worsening reaction. Maintain IV access with normal saline using new tubing to preserve venous access.",
"INCORRECT: Monitoring without stopping risks severe hemolysis or anaphylaxis.",
"INCORRECT: Medication may be required later, but stopping the transfusion is the priority intervention."
]
},

{
q: "What is the correct adult Rule of 9's percentage for EACH leg?",
options: [
"9%",
"12%",
"18%",
"21%"
],
correct: 2,
rationales: [
"INCORRECT: 9% applies to each arm, not each leg.",
"INCORRECT: 12% is not used in adult Rule of 9's calculations.",
"CORRECT: Each leg accounts for 18% of total body surface area in adults (9% anterior + 9% posterior).",
"INCORRECT: 21% is not part of standard adult burn calculation."
]
},

{
q: "Most common symptom of systemic lupus erythematosus (SLE)?",
options: [
"Butterfly rash",
"Fatigue",
"Renal colic",
"Hemoptysis"
],
correct: 1,
rationales: [
"INCORRECT: The malar rash is a hallmark feature but not the most commonly reported symptom.",
"CORRECT: Fatigue is the most frequently reported symptom in SLE patients.",
"INCORRECT: Renal involvement occurs but does not present as renal colic.",
"INCORRECT: Hemoptysis is not a common presenting feature of SLE."
]
},

{
q: "Most common symptom of multiple sclerosis?",
options: [
"Chronic cough",
"Fatigue",
"Persistent fever",
"Diarrhea"
],
correct: 1,
rationales: [
"INCORRECT: MS is a neurologic condition and does not primarily cause cough.",
"CORRECT: Fatigue is the most common symptom reported in MS.",
"INCORRECT: Fever is not a defining feature of MS.",
"INCORRECT: Diarrhea is unrelated to MS pathology."
]
},

{
q: "Best indicator of acute dehydration in children?",
options: [
"Mucous membranes",
"Daily weight",
"Skin turgor",
"Urine color"
],
correct: 1,
rationales: [
"INCORRECT: Dry mucous membranes indicate dehydration but are not the most sensitive measurement.",
"CORRECT: Daily weight is the most sensitive and objective indicator of fluid loss.",
"INCORRECT: Skin turgor is less reliable in pediatric patients.",
"INCORRECT: Urine color may change but is not the most accurate assessment."
]
},

{
q: "Target oxygen saturation range for COPD patients?",
options: [
"100%",
"95–100%",
"88–92%",
"Above 98%"
],
correct: 2,
rationales: [
"INCORRECT: 100% oxygen saturation may suppress respiratory drive in CO2 retainers.",
"INCORRECT: 95–100% may cause hypercapnia in severe COPD.",
"CORRECT: 88–92% is the recommended target to balance oxygenation while preventing CO2 retention.",
"INCORRECT: Above 98% is not recommended in chronic CO2 retainers."
]
},

{
q: "Treatment for conscious hypoglycemic patient?",
options: [
"IV D50",
"Administer insulin",
"15 g rapid-acting oral glucose",
"Observe only"
],
correct: 2,
rationales: [
"INCORRECT: IV D50 is for unconscious or severely symptomatic patients.",
"INCORRECT: Insulin would worsen hypoglycemia.",
"CORRECT: 15 g rapid-acting carbohydrate is first-line treatment for conscious patients.",
"INCORRECT: Delaying treatment risks neurological injury."
]
},

{
q: "Treatment for unconscious hypoglycemic patient?",
options: [
"Oral glucose",
"IV D50 or IM glucagon if no IV access",
"Administer insulin",
"Wait for labs"
],
correct: 1,
rationales: [
"INCORRECT: Oral intake risks aspiration in unconscious patients.",
"CORRECT: Immediate IV dextrose or IM glucagon is required to rapidly restore glucose levels.",
"INCORRECT: Insulin is contraindicated.",
"INCORRECT: Treatment must not be delayed for laboratory confirmation."
]
}

];

const container = document.getElementById("quiz-container");

questions.forEach((item, index) => {
  const box = document.createElement("div");
  box.className = "quiz-box";

  const question = document.createElement("div");
  question.className = "quiz-question";
  question.innerText = "Question " + (index+1) + ": " + item.q;
  box.appendChild(question);

  item.options.forEach((opt, i) => {
    const option = document.createElement("div");
    option.className = "quiz-option";
    option.innerText = opt;
    option.onclick = function() {
      const feedback = box.querySelector(".quiz-feedback");
      box.querySelectorAll(".quiz-option").forEach(o => o.classList.remove("correct","incorrect"));
      
      if(i === item.correct){
        option.classList.add("correct");
        feedback.className = "quiz-feedback feedback-correct";
      } else {
        option.classList.add("incorrect");
        feedback.className = "quiz-feedback feedback-incorrect";
      }

      feedback.innerText = item.rationales[i];
      feedback.style.display = "block";
    };
    box.appendChild(option);
  });

  const feedback = document.createElement("div");
  feedback.className = "quiz-feedback";
  box.appendChild(feedback);

  container.appendChild(box);
});

</script>

</body>
</html>
